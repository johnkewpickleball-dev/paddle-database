<!doctype html>
<html>
<head><meta charset="utf-8"><title>Radiology Lab iframe embed test harness (throwaway — not linked from anywhere)</title></head>
<body style="margin:0;font-family:sans-serif">
<div id="log" style="position:fixed;top:0;right:0;background:#000;color:#0f0;font-size:11px;padding:6px;z-index:99999;max-width:320px;white-space:pre-wrap"></div>
<div style="height:400px;background:#eee;display:flex;align-items:center;justify-content:center">Scroll past me — content above the iframe, like a real Squarespace page</div>
<iframe
  id="radiologyLabFrame"
  style="width:100%; height:600px; border:none; display:block;"
  title="Radiology Lab test"
  src="radiology-lab.html">
</iframe>
<div style="height:400px;background:#eee;display:flex;align-items:center;justify-content:center">Content below the iframe</div>
<script>
(function(){
  var ifr = document.getElementById('radiologyLabFrame');
  var log = document.getElementById('log');
  var history = [];
  window.addEventListener('message', function(e){
    if(!e.data || e.data.source !== 'radiology-lab' || e.data.type !== 'paddleDbResize') return;
    var h = e.data.height;
    if(h && h > 0){
      ifr.style.height = (h + 20) + 'px';
      history.push(h);
      window.__heightHistory = history;
      log.textContent = 'reports: ' + history.length + '\nlatest heights: ' + history.slice(-8).join(', ');
    }
  });
  window.__getChildScrollY = function(){
    try { return ifr.contentWindow.scrollY; } catch(e){ return 'ERR:'+e.message; }
  };
})();
</script>
</body>
</html>
